<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Open Grace</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML += '<div style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:#800000;color:white;z-index:999999;padding:2rem;font-size:2rem;overflow:auto">ERROR: ' + e.error.stack + '</div>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.body.innerHTML += '<div style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:#800000;color:white;z-index:999999;padding:2rem;font-size:2rem;overflow:auto">PROMISE ERROR: ' + (e.reason && e.reason.stack ? e.reason.stack : e.reason) + '</div>';
      });
    </script>
  </body>
</html>
