version: "3.9"

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: open_grace_backend
    ports:
      - "8000:8000"
    volumes:
      - ./workspace:/app/workspace
      - ./logs:/app/logs
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - DATABASE_URL=sqlite:///./workspace/open_grace.db
    depends_on:
      - ollama
    networks:
      - grace_network

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: open_grace_dashboard
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - grace_network

  ollama:
    image: ollama/ollama:latest
    container_name: open_grace_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - grace_network

networks:
  grace_network:
    driver: bridge

volumes:
  ollama_data:
